# DigitalOcean App Platform spec for Beacon (sprint-012 / Milestone 4).
# Deploy with: doctl apps create --spec .do/app.yaml  (full runbook: docs/DEPLOYMENT.md,
# added in Milestone 5 — not present yet).
#
# One Dockerfile-backed web service hosts every Beacon surface (ingest, query API,
# dashboard, and the URL shortener at root) plus the DB-free /health probe. A Managed
# Postgres is bound to DATABASE_URL, and a PRE_DEPLOY job runs the idempotent migrations
# before each deploy. ADMIN_TOKEN is a secret set at deploy time (dashboard / doctl), not
# committed here.
name: beacon

services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: paulingalls/beacon
      branch: main
      # Deliberate manual deploys (doctl apps create-deployment) rather than auto-deploy on
      # every push: main's branch protection has enforce_admins=false, so an admin close-flow
      # merge can land on main with red CI — auto-deploy would ship that to prod. Flip to true
      # once admin merges are gated too (the gh-pr-merge follow-up, debt 436ba25557e2).
      deploy_on_push: false
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    # /health is DB-free, so a Postgres outage degrades the app without failing the
    # health check and cycling the instance (REQUIREMENTS.md §1.3).
    health_check:
      http_path: /health
    # Single root route — the shortener (GET /:code), /analytics/*, and /health are all
    # served by this one service.
    routes:
      - path: /
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${beacon-db.DATABASE_URL}
      - key: ADMIN_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: PRODUCT_ID
        scope: RUN_TIME
        value: beacon
      # Optional operator-set envs (apps/server reads these; safe defaults when unset):
      #   SHORT_DOMAIN      absolute base for short URLs, e.g. https://pi.ink — WITHOUT it the
      #                     shortener emits relative /CODE redirects. Set for a real short domain.
      #   PRODUCT_ALLOWLIST comma-separated allowlist of accepted product_ids (PRODUCT_ID must be in it)
      #   BASE_PATH         API mount prefix (default /analytics)

databases:
  - name: beacon-db
    engine: PG
    version: "16"
    production: true

jobs:
  # Runs the existing `bun run migrate` entrypoint (advisory-locked + idempotent) against
  # the managed DB before each deploy of the web service.
  - name: migrate
    kind: PRE_DEPLOY
    dockerfile_path: Dockerfile
    github:
      repo: paulingalls/beacon
      branch: main
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    run_command: bun run migrate
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${beacon-db.DATABASE_URL}
