# Local Postgres for Beacon integration tests and `bun run migrate`.
#
# Host port defaults to 5544 (override with BEACON_PG_PORT) to avoid colliding
# with other Postgres instances on shared dev machines — the container always
# listens on 5432 internally.
#
# Bring it up before running DB-touching tests or migrations:
#   docker compose up -d
#
# Then point the app and tests at it:
#   export DATABASE_URL=postgres://beacon:beacon@localhost:5544/beacon
#   export TEST_DATABASE_URL=postgres://beacon:beacon@localhost:5544/beacon
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacon
      POSTGRES_DB: beacon
    ports:
      - "${BEACON_PG_PORT:-5544}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon -d beacon"]
      interval: 2s
      timeout: 3s
      retries: 15
