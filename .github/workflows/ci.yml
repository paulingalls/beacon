# Beacon CI (sprint-011 / Milestone 3, closes risk 8624f2184821).
#
# Runs on every push and PR: lint + typecheck (DB-free) plus the full DB-backed
# bun test and the Playwright dashboard e2e, both against a real Postgres 16 service
# container mirroring docker-compose.yml credentials. The test job's preset
# TEST_DATABASE_URL drives the ensure-test-db preflight (verifyExternalDb probes it,
# fails loud if unreachable, skips the docker bootstrap), and the DB-coverage guard
# (decision a02afa9ca404) must PASS — proving Postgres is genuinely exercised, not skipped.
#
# CI-hardening (debt b4935388afd3): the Postgres service pulls from the AWS ECR Public
# mirror (public.ecr.aws/docker/library/postgres:16-alpine — same image as docker-compose's
# postgres:16-alpine, NOT subject to Docker Hub's anonymous pull-rate limit; a service
# container is pulled before any step runs, so a docker-login step cannot help it).
# Every action is pinned to a full commit SHA (supply-chain integrity, concern b7133c8d62d8)
# with a trailing # vX.Y.Z comment naming the release: checkout v6.0.3, setup-bun v2.2.0, cache
# v5.0.5 — each a Node-24 build, ahead of GitHub's Node-20 runtime removal (2026-06-16). A
# guard (test/acceptance/ci/action-pinning.test.ts) fails if any action reverts to a mutable tag.
name: CI

on:
  # Run on every push EXCEPT main: main is releases-only, and its CI is the hard
  # gate inside deploy.yml (which calls this workflow via workflow_call before the
  # SSH deploy). Excluding main here avoids a redundant second CI run per release.
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:
  # Reusable: deploy.yml does `uses: ./.github/workflows/ci.yml` so a production
  # deploy only runs after this full suite passes on the merged main commit.
  workflow_call:

# Least-privilege GITHUB_TOKEN: every job only checks out code and runs tests —
# none write to the repo, releases, or packages. Pin read-only here so the token
# does not inherit a write-default from repo/org settings.
permissions:
  contents: read

# One run per ref; a new push cancels an in-flight run for the same branch —
# EXCEPT on the long-lived branches main and develop, where every commit must keep
# its own completed run (a cancelled run would leave a commit without a green CI
# record). main reaches this workflow only via deploy.yml's workflow_call, where
# github.ref is still refs/heads/main — so the no-cancel rule still applies there.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Cache bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Cache bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16-alpine
        env:
          POSTGRES_USER: beacon
          POSTGRES_PASSWORD: beacon
          POSTGRES_DB: beacon
        ports:
          - 5432:5432
        # Mirrors docker-compose.yml's healthcheck so the job waits for a ready DB.
        options: >-
          --health-cmd "pg_isready -U beacon -d beacon"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    env:
      # Preset URL → ensure-test-db probes it (fail loud) and skips docker; suites
      # self-migrate in their beforeAll (decision 6d348d2d0cec), so no migrate step.
      TEST_DATABASE_URL: postgres://beacon:beacon@localhost:5432/beacon
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Cache bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16-alpine
        env:
          POSTGRES_USER: beacon
          POSTGRES_PASSWORD: beacon
          POSTGRES_DB: beacon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U beacon -d beacon"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://beacon:beacon@localhost:5432/beacon
      CI: "true" # playwright.config: forbidOnly on CI
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Cache bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
