# Runs lint + tests before every commit (SMM constraint: git commit hooks).
# Install the git hooks once with: bunx lefthook install
#
# pre-commit stays fast and DB-free: BEACON_TEST_DB=off tells the bun test
# preload (test/setup/ensure-test-db.ts) not to start Postgres, so the
# integration suites skip. pre-push runs the full suite WITH the DB (the preload
# auto-starts the compose Postgres), catching anything the DB-free commit missed.
pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: '*.{ts,tsx,js,jsx,json,jsonc}'
      run: bunx biome check --no-errors-on-unmatched {staged_files}
    - name: test
      run: BEACON_TEST_DB=off bun test

pre-push:
  jobs:
    - name: test
      run: bun test
